name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

jobs:
  security:
    name: Security scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        
    - name: Install system dependencies for Pillow
      run: |
          sudo apt-get update
          sudo apt-get install -y libjpeg-dev zlib1g-dev
    - name: Install dependencies
      # Create venv and install dependencies needed for safety check.
      run: |
        python -m venv .venv
        source .venv/bin/activate
        pip install --upgrade pip
        # Install production dependencies (for full scan context)
        pip install -r requirements.txt
        # Explicitly install safety
        pip install safety
    
    - name: Run safety check
      # Execute safety check from the venv
      run: .venv/bin/safety check --full-report --json || true
      # Safety check should usually be a high-priority failure, but keeping continue-on-error for now.
      continue-on-error: true

  sonarqube:
    name: SQC Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # Fetch all history for better blame information
        fetch-depth: 0
    
    - name: SonarQube Scan
      id: sonar-scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: https://sonarcloud.io
      continue-on-error: true
